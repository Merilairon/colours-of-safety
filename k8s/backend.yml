apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: colours-of-safety
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/merilairon/colours-of-safety-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_EXPIRES_IN
            - name: REVIEWER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REVIEWER_EMAIL
            - name: REVIEWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REVIEWER_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: colours-of-safety
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
