apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: actions-runner-role
  namespace: colours-of-safety
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: actions-runner-binding
  namespace: colours-of-safety
subjects:
  - kind: ServiceAccount
    name: colours-of-safety-runner
    namespace: actions-runner-system
roleRef:
  kind: Role
  name: actions-runner-role
  apiGroup: rbac.authorization.k8s.io
