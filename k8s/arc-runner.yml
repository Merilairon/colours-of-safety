apiVersion: v1
kind: ServiceAccount
metadata:
  name: colours-of-safety-runner
  namespace: actions-runner-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: colours-of-safety-deployer
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - configmaps
      - secrets
      - services
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: colours-of-safety-deployer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: colours-of-safety-deployer
subjects:
  - kind: ServiceAccount
    name: colours-of-safety-runner
    namespace: actions-runner-system
---
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: colours-of-safety-runner
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      repository: merilairon/colours-of-safety
      serviceAccountName: colours-of-safety-runner
      labels:
        - colours-of-safety
