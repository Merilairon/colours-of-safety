apiVersion: batch/v1
kind: CronJob
metadata:
  name: geo-seed
  namespace: colours-of-safety
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200  # 2-hour timeout (197 cities + retries)
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: geo-seed
              image: ghcr.io/merilairon/colours-of-safety-backend:latest
              command: ["npm", "run", "seed:geo"]
              env:
                - name: DB_HOST
                  value: postgres
                - name: DB_PORT
                  value: "5432"
                - name: DB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: DB_USERNAME
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: DB_PASSWORD
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: DB_NAME
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: JWT_SECRET
