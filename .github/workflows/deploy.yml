name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image names
        id: images
        run: |
          echo "backend=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/colours-of-safety-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/colours-of-safety-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.images.outputs.backend }}
            ${{ steps.images.outputs.frontend }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.backend }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.frontend }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to k3s
    runs-on: colours-of-safety
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/frontend-nginx-configmap.yml
          kubectl apply -f k8s/cloudflare-tunnel-ingress.yml

      - name: Apply postgres
        run: kubectl apply -f k8s/postgres.yml

      - name: Apply backend
        run: |
          kubectl apply -f k8s/backend.yml
          kubectl set image deployment/backend \
            backend=${{ needs.build-and-push.outputs.backend_image }}:${{ needs.build-and-push.outputs.image_tag }} \
            --namespace colours-of-safety

      - name: Apply frontend
        run: |
          kubectl apply -f k8s/frontend.yml
          kubectl set image deployment/frontend \
            frontend=${{ needs.build-and-push.outputs.frontend_image }}:${{ needs.build-and-push.outputs.image_tag }} \
            --namespace colours-of-safety

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --namespace colours-of-safety --timeout=120s
          kubectl rollout status deployment/frontend --namespace colours-of-safety --timeout=120s
