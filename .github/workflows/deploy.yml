name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        run: npx jest --no-coverage
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npx vitest run
        working-directory: frontend

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image names
        id: images
        run: |
          echo "backend=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/colours-of-safety-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${GITHUB_REPOSITORY_OWNER@L}/colours-of-safety-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.images.outputs.backend }}
            ${{ steps.images.outputs.frontend }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.backend }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.frontend }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to k3s
    runs-on: colours-of-safety
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/frontend-nginx-configmap.yml
          kubectl apply -f k8s/cloudflare-tunnel-ingress.yml

      - name: Apply postgres
        run: kubectl apply -f k8s/postgres.yml

      - name: Run database migrations
        run: |
          kubectl run migration-job \
            --image=${{ needs.build-and-push.outputs.backend_image }}:${{ needs.build-and-push.outputs.image_tag }} \
            --namespace=colours-of-safety \
            --restart=Never \
            --env=DB_HOST=postgres \
            --env=DB_PORT=5432 \
            --env=DB_USERNAME=$(kubectl get secret app-secrets -n colours-of-safety -o jsonpath='{.data.DB_USERNAME}' | base64 -d) \
            --env=DB_PASSWORD=$(kubectl get secret app-secrets -n colours-of-safety -o jsonpath='{.data.DB_PASSWORD}' | base64 -d) \
            --env=DB_NAME=$(kubectl get secret app-secrets -n colours-of-safety -o jsonpath='{.data.DB_NAME}' | base64 -d) \
            --command -- npx typeorm migration:run -d src/data-source.ts \
            --attach=false

          # Wait for job to complete
          kubectl wait --for=condition=complete job/migration-job -n colours-of-safety --timeout=300s

          # Clean up the job
          kubectl delete job migration-job -n colours-of-safety

      - name: Apply backend
        run: |
          kubectl apply -f k8s/backend.yml
          kubectl set image deployment/backend \
            backend=${{ needs.build-and-push.outputs.backend_image }}:${{ needs.build-and-push.outputs.image_tag }} \
            --namespace colours-of-safety

      - name: Apply frontend
        run: |
          kubectl apply -f k8s/frontend.yml
          kubectl set image deployment/frontend \
            frontend=${{ needs.build-and-push.outputs.frontend_image }}:${{ needs.build-and-push.outputs.image_tag }} \
            --namespace colours-of-safety

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --namespace colours-of-safety --timeout=120s
          kubectl rollout status deployment/frontend --namespace colours-of-safety --timeout=120s
