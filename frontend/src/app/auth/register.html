<div class="auth-card">
  <h1>Sign up</h1>
  <p class="sub">Create an account to contribute safe places and districts.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Display name
      <input type="text" formControlName="displayName" autocomplete="nickname" />
    </label>
    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <label>
      Password
      <input type="password" formControlName="password" autocomplete="new-password" />
      <small>At least 8 characters.</small>
    </label>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Creating account…' : 'Sign up' }}
    </button>
  </form>

  <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
</div>
