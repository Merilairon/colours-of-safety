<div class="auth-card">
  <h1>Sign up</h1>
  <p class="sub">Create an account to contribute safe places and districts.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Display name
      <input type="text" formControlName="displayName" autocomplete="nickname" />
    </label>
    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <label>
      Password
      <input type="password" formControlName="password" autocomplete="new-password" />
      <small>At least 8 characters.</small>
    </label>
    <label>
      Pronouns <small>(optional)</small>
      <select formControlName="pronouns">
        <option value="">Prefer not to say / skip</option>
        <option value="they/them">they/them</option>
        <option value="she/her">she/her</option>
        <option value="he/him">he/him</option>
        <option value="ze/zir">ze/zir</option>
        <option value="prefer not to say">Prefer not to say</option>
        <option value="custom">Custom (add in profile)</option>
      </select>
    </label>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Creating account…' : 'Sign up' }}
    </button>
  </form>

  <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
</div>
